name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds the image and stores layers in GitHub Actions cache
      - name: Build (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: structura:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: basic runtime smoke-check (customize for your app)
      # - name: Smoke run
      #   run: docker run --rm structura:ci --help
