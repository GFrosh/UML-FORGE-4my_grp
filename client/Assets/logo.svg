<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b61ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff" />
      <stop offset="100%" style="stop-color:#7b61ff" />
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b61ff" />
      <stop offset="100%" style="stop-color:#ff6b6b" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="32" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="350" x2="400" y2="350"/>
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
  </g>

  <!--
    S shape defined by 7 nodes:
    N1 (top-right)       → N2 (top-left)
    N2 (top-left)        → N3 (center-left, upper)
    N3 (center-left)     → N4 (center, mid)
    N4 (center, mid)     → N5 (center-right, lower)
    N5 (center-right)    → N6 (bottom-right)
    N6 (bottom-right)    → N7 (bottom-left)

    Node positions:
    N1: (280, 90)
    N2: (130, 90)
    N3: (110, 185)
    N4: (200, 200)
    N5: (290, 215)
    N6: (270, 310)
    N7: (120, 310)
  -->

  <!-- Connection lines (drawn behind nodes) -->
  <!-- N1 to N2 -->
  <line x1="280" y1="90" x2="130" y2="90"
        stroke="url(#strokeGrad)" stroke-width="4" stroke-linecap="round"
        opacity="0.9" filter="url(#glow)"/>

  <!-- N2 to N3 -->
  <line x1="130" y1="90" x2="110" y2="185"
        stroke="url(#strokeGrad)" stroke-width="4" stroke-linecap="round"
        opacity="0.9" filter="url(#glow)"/>

  <!-- N3 to N4 -->
  <line x1="110" y1="185" x2="200" y2="200"
        stroke="url(#strokeGrad)" stroke-width="4" stroke-linecap="round"
        opacity="0.9" filter="url(#glow)"/>

  <!-- N4 to N5 -->
  <line x1="200" y1="200" x2="290" y2="215"
        stroke="url(#strokeGrad)" stroke-width="4" stroke-linecap="round"
        opacity="0.9" filter="url(#glow)"/>

  <!-- N5 to N6 -->
  <line x1="290" y1="215" x2="270" y2="310"
        stroke="url(#strokeGrad)" stroke-width="4" stroke-linecap="round"
        opacity="0.9" filter="url(#glow)"/>

  <!-- N6 to N7 -->
  <line x1="270" y1="310" x2="120" y2="310"
        stroke="url(#strokeGrad)" stroke-width="4" stroke-linecap="round"
        opacity="0.9" filter="url(#glow)"/>

  <!-- Nodes -->
  <!-- N1 top-right: cyan -->
  <circle cx="280" cy="90" r="14" fill="url(#nodeGrad1)" filter="url(#softGlow)"/>
  <circle cx="280" cy="90" r="7" fill="#ffffff" opacity="0.9"/>

  <!-- N2 top-left: cyan/purple -->
  <circle cx="130" cy="90" r="14" fill="url(#nodeGrad1)" filter="url(#softGlow)"/>
  <circle cx="130" cy="90" r="7" fill="#ffffff" opacity="0.9"/>

  <!-- N3 mid-left: purple -->
  <circle cx="110" cy="185" r="14" fill="url(#nodeGrad2)" filter="url(#softGlow)"/>
  <circle cx="110" cy="185" r="7" fill="#ffffff" opacity="0.9"/>

  <!-- N4 center: accent (larger — pivot point of the S) -->
  <circle cx="200" cy="200" r="18" fill="url(#nodeGrad2)" filter="url(#softGlow)"/>
  <circle cx="200" cy="200" r="9" fill="#ffffff" opacity="0.95"/>

  <!-- N5 mid-right: purple/red -->
  <circle cx="290" cy="215" r="14" fill="url(#nodeGrad2)" filter="url(#softGlow)"/>
  <circle cx="290" cy="215" r="7" fill="#ffffff" opacity="0.9"/>

  <!-- N6 bottom-right: red -->
  <circle cx="270" cy="310" r="14" fill="url(#nodeGrad2)" filter="url(#softGlow)"/>
  <circle cx="270" cy="310" r="7" fill="#ffffff" opacity="0.9"/>

  <!-- N7 bottom-left: red -->
  <circle cx="120" cy="310" r="14" fill="url(#nodeGrad2)" filter="url(#softGlow)"/>
  <circle cx="120" cy="310" r="7" fill="#ffffff" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="200" y="374"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="22"
        font-weight="900"
        fill="#ffffff"
        letter-spacing="10"
        text-anchor="middle"
        opacity="0.85">STRUCTURA</text>
</svg>
